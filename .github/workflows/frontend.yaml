name: Frontend Deploy
on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env from GitHub Secrets
        shell: bash
        run: |
          cat > .env <<EOF
          NEXT_PUBLIC_BACKEND_URL=http://chatbot-be:8000
          BACKEND_URL=http://chatbot-be:8000
          FRONTEND_URL=https://chatbot.theedpsych.co.uk
          NODE_ENV=production
          EOF

      - name: Allow .env in Docker build
        run: sed -i '/.env/d' .dockerignore || true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Docker Image
        id: build-image
        env:
          ECR_REGISTRY: 476114133766.dkr.ecr.eu-west-2.amazonaws.com
          ECR_REPO: prod-chatbot-fe
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile-fe \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition prod-chatbot-fe \
            --region eu-west-2 \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: chatbot-fe-cont
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: Prod_Cluster
          service: prod-chatbot-fe-service
          force-new-deployment: true
          wait-for-service-stability: true
