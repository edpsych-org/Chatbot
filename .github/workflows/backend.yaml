name: Backend Deploy

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env from GitHub Secrets
        shell: bash
        run: |
          # Static values
          echo "BACKEND_HOST=0.0.0.0" > .env
          echo "BACKEND_PORT=8000" >> .env
          echo "BACKEND_RELOAD=false" >> .env
          echo "DEBUG_MODE=false" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=1440" >> .env
          echo "MAGIC_LINK_EXPIRY_HOURS=48" >> .env
          echo "TESSERACT_PATH=/usr/bin/tesseract" >> .env
          echo "TESSERACT_LANG=eng" >> .env
          echo "MAX_FILE_SIZE_MB=10" >> .env
          echo "ALLOWED_FILE_TYPES=pdf,png,jpg,jpeg" >> .env
          echo "AI_TEMPERATURE=0.3" >> .env
          echo "AI_MAX_TOKENS=2000" >> .env
          echo "AI_RETRY_ATTEMPTS=3" >> .env
          echo "REPORT_LANGUAGE=en-GB" >> .env
          echo "REPORT_FONT_SIZE=11" >> .env
          echo "REPORT_PAGE_SIZE=A4" >> .env
          echo "OPENAI_MODEL=gpt-4o-mini" >> .env
          echo "OPENAI_BASE_URL=https://api.openai.com/v1" >> .env
          echo "GROQ_MODEL=llama-3.1-8b-instant" >> .env
          echo "GROQ_BASE_URL=https://api.groq.com/openai/v1" >> .env
          echo "EMAIL_FROM_NAME=The EdPsych Practice" >> .env
          echo "EMAIL_FROM_ADDRESS=noreply@edpsych.com" >> .env

          # Secrets
          DATABASE_URL="${{ secrets.DATABASE_URL }}"
          echo "DATABASE_URL=$DATABASE_URL" >> .env

          SECRET_KEY="${{ secrets.SECRET_KEY }}"
          echo "SECRET_KEY=$SECRET_KEY" >> .env

          CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}"
          echo "CORS_ORIGINS=$CORS_ORIGINS" >> .env

          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          echo "FRONTEND_URL=$FRONTEND_URL" >> .env

          USE_OPENAI="${{ secrets.USE_OPENAI }}"
          echo "USE_OPENAI=$USE_OPENAI" >> .env

          OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env

          USE_GROQ="${{ secrets.USE_GROQ }}"
          echo "USE_GROQ=$USE_GROQ" >> .env

          GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
          echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env

          AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> .env

          AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> .env

          AWS_REGION="${{ secrets.AWS_REGION }}"
          echo "AWS_REGION=$AWS_REGION" >> .env

          S3_BUCKET_IQ_TESTS="${{ secrets.S3_BUCKET_IQ_TESTS }}"
          echo "S3_BUCKET_IQ_TESTS=$S3_BUCKET_IQ_TESTS" >> .env

          S3_BUCKET_REPORTS="${{ secrets.S3_BUCKET_REPORTS }}"
          echo "S3_BUCKET_REPORTS=$S3_BUCKET_REPORTS" >> .env

          S3_BUCKET_TEMP="${{ secrets.S3_BUCKET_TEMP }}"
          echo "S3_BUCKET_TEMP=$S3_BUCKET_TEMP" >> .env

          S3_ENDPOINT_URL="${{ secrets.S3_ENDPOINT_URL }}"
          echo "S3_ENDPOINT_URL=$S3_ENDPOINT_URL" >> .env

          BREVO_API_KEY="${{ secrets.BREVO_API_KEY }}"
          echo "BREVO_API_KEY=$BREVO_API_KEY" >> .env

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: prod-chatbot-be
          IMAGE_TAG: latest
        run: |
          docker build -f Dockerfile-be \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG


      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: prod-chatbot-be-revision.json
          cluster: Prod_Cluster
          service: prod-chatbot-be-service
          force-new-deployment: true
