name: Backend Deploy

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Docker Image
        run: |
          docker build -f Dockerfile-be \
            -t 476114133766.dkr.ecr.eu-west-2.amazonaws.com/prod-chatbot-be:latest .
          docker push 476114133766.dkr.ecr.eu-west-2.amazonaws.com/prod-chatbot-be:latest

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition prod-chatbot-be \
            --region eu-west-2 \
            --query taskDefinition \
            > task-definition.json

      - name: Inject env vars into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: chatbot-be-cont
          image: 476114133766.dkr.ecr.eu-west-2.amazonaws.com/prod-chatbot-be:latest
          environment-variables: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
            FRONTEND_URL=http://localhost:3000
            USE_OPENAI=true
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=gpt-4o-mini
            OPENAI_BASE_URL=https://api.openai.com/v1
            USE_GROQ=true
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GROQ_MODEL=llama-3.1-8b-instant
            GROQ_BASE_URL=https://api.groq.com/openai/v1
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=eu-west-2
            S3_BUCKET_IQ_TESTS=${{ secrets.S3_BUCKET_IQ_TESTS }}
            S3_BUCKET_REPORTS=${{ secrets.S3_BUCKET_REPORTS }}
            S3_BUCKET_TEMP=${{ secrets.S3_BUCKET_TEMP }}
            S3_ENDPOINT_URL=${{ secrets.S3_ENDPOINT_URL }}
            BACKEND_HOST=0.0.0.0
            BACKEND_PORT=8000
            BACKEND_RELOAD=false
            DEBUG_MODE=false
            LOG_LEVEL=INFO
            ALGORITHM=HS256
            ACCESS_TOKEN_EXPIRE_MINUTES=1440
            MAGIC_LINK_EXPIRY_HOURS=48
            TESSERACT_PATH=/usr/bin/tesseract
            TESSERACT_LANG=eng
            MAX_FILE_SIZE_MB=10
            ALLOWED_FILE_TYPES=pdf,png,jpg,jpeg
            AI_TEMPERATURE=0.3
            AI_MAX_TOKENS=2000
            AI_RETRY_ATTEMPTS=3
            REPORT_LANGUAGE=en-GB
            REPORT_FONT_SIZE=11
            REPORT_PAGE_SIZE=A4
            EMAIL_FROM_NAME=The EdPsych Practice
            EMAIL_FROM_ADDRESS=noreply@edpsych.com

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: Prod_Cluster
          service: prod-chatbot-be-service
          force-new-deployment: true
