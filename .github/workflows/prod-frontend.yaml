name: Frontend Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for Next.js build
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}" > .env
          echo "NODE_ENV=production" >> .env

      - name: Allow .env in Docker build
        run: sed -i '/.env/d' .dockerignore || true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.GH_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.GH_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: prod-chatbot-fe
        run: |
          docker build --no-cache \
            -f Dockerfile-fe \
            -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "Logging into ECR..."
            aws ecr get-login-password --region eu-west-2 \
            | docker login --username AWS --password-stdin 476114133766.dkr.ecr.eu-west-2.amazonaws.com

            cd /home/ubuntu/actions-runner

            echo "Pulling latest images..."
            docker compose -p prod -f prod-compose.yaml pull

            echo "Restarting containers..."
            docker compose -p prod -f prod-compose.yaml up -d

            echo "Cleaning up old images..."
            docker image prune -af

            echo "Deployment complete!"
            docker ps --filter "name=prod-chatbot"
