name: Staging Backend Deploy

on:
  push:
    branches:
      - edpsych-patch-2
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # Create environment file
      # ---------------------------
      - name: Create .env
        run: |
          cat <<EOF > .env
          BACKEND_HOST=${{ vars.BACKEND_HOST }}
          BACKEND_PORT=${{ vars.BACKEND_PORT }}
          BACKEND_RELOAD=${{ vars.BACKEND_RELOAD }}
          DEBUG_MODE=${{ vars.DEBUG_MODE }}
          LOG_LEVEL=${{ vars.LOG_LEVEL }}

          ALGORITHM=${{ vars.ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES=${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
          MAGIC_LINK_EXPIRY_HOURS=${{ vars.MAGIC_LINK_EXPIRY_HOURS }}

          TESSERACT_PATH=${{ vars.TESSERACT_PATH }}
          TESSERACT_LANG=${{ vars.TESSERACT_LANG }}

          MAX_FILE_SIZE_MB=${{ vars.MAX_FILE_SIZE_MB }}
          ALLOWED_FILE_TYPES=${{ vars.ALLOWED_FILE_TYPES }}

          AI_TEMPERATURE=${{ vars.AI_TEMPERATURE }}
          AI_MAX_TOKENS=${{ vars.AI_MAX_TOKENS }}
          AI_RETRY_ATTEMPTS=${{ vars.AI_RETRY_ATTEMPTS }}

          REPORT_LANGUAGE=${{ vars.REPORT_LANGUAGE }}
          REPORT_FONT_SIZE=${{ vars.REPORT_FONT_SIZE }}
          REPORT_PAGE_SIZE=${{ vars.REPORT_PAGE_SIZE }}

          OPENAI_MODEL=${{ vars.OPENAI_MODEL }}
          OPENAI_BASE_URL=${{ vars.OPENAI_BASE_URL }}
          GROQ_MODEL=${{ vars.GROQ_MODEL }}
          GROQ_BASE_URL=${{ vars.GROQ_BASE_URL }}

          USE_OPENAI=${{ vars.USE_OPENAI }}
          USE_GROQ=${{ vars.USE_GROQ }}

          EMAIL_FROM_NAME=${{ vars.EMAIL_FROM_NAME }}
          EMAIL_FROM_ADDRESS=${{ vars.EMAIL_FROM_ADDRESS }}

          AWS_REGION=${{ vars.AWS_REGION }}

          FRONTEND_URL=${{ vars.STAGE_FRONTEND_URL }}
          CORS_ORIGINS=${{ vars.STAGE_CORS_ORIGINS }}

          S3_BUCKET_IQ_TESTS=${{ vars.S3_BUCKET_IQ_TESTS }}
          S3_BUCKET_REPORTS=${{ vars.S3_BUCKET_REPORTS }}
          S3_BUCKET_TEMP=${{ vars.S3_BUCKET_TEMP }}
          S3_ENDPOINT_URL=${{ vars.S3_ENDPOINT_URL }}

          DATABASE_URL=${{ secrets.STAGE_DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          EOF

      # ---------------------------
      # Fix .dockerignore issue
      # ---------------------------
      - name: Allow .env in Docker build
        run: sed -i '/.env/d' .dockerignore || true

      # ---------------------------
      # AWS Login
      # ---------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------
      # Build + Push Image
      # ---------------------------
      - name: Build & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: stage-chatbot-api
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          echo "Building Docker image..."
          docker build --no-cache -f Dockerfile-be \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$REPOSITORY:latest .

          echo "Pushing images..."
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      # ---------------------------
      # Deploy on EC2 (Self-hosted runner)
      # ---------------------------
      - name: Deploy on EC2 (self-hosted runner)
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: stage-chatbot-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Stopping old container..."
          docker stop stage-chatbot-api || true
          docker rm stage-chatbot-api || true

          echo "Pulling latest image..."
          docker pull $REGISTRY/$REPOSITORY:$IMAGE_TAG

          echo "Running new container..."
          docker run -d \
            --name stage-chatbot-api \
            --restart unless-stopped \
            -p 8000:8000 \
            $REGISTRY/$REPOSITORY:$IMAGE_TAG

          echo "Deployment completed successfully"
