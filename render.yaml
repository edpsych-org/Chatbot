services:
  - type: web
    name: edpsych-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: USE_GROQ
        value: "true"
      - key: DEBUG_MODE
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ALGORITHM
        value: HS256
