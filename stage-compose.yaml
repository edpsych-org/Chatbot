version: "3.9"

services:

  backend:
    image: 476114133766.dkr.ecr.eu-west-2.amazonaws.com/stage-chatbot-api:latest
    container_name: stage-chatbot-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    networks:
      - app-network

  frontend:
    image: 476114133766.dkr.ecr.eu-west-2.amazonaws.com/stage-chatbot-web:latest
    container_name: stage-chatbot-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://18.169.158.210:8000/api/v1
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge