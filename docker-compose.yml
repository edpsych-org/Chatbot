version: '3.8'

# Local-dev only. Object storage is not simulated locally anymore —
# the backend uses real AWS S3 (bucket name in .env). If you need to
# work offline without AWS, the S3 service gracefully degrades to
# a dev-mode log rather than running a MinIO container.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: edpsych_postgres
    environment:
      POSTGRES_USER: edpsych
      POSTGRES_PASSWORD: edpsych_secure_password
      POSTGRES_DB: edpsych_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - edpsych-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edpsych"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  edpsych-network:
    driver: bridge

volumes:
  postgres-data:
